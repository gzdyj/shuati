server:
  port: ${SERVER_PORT:8080}
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: quiz-master
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quiz_master?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    charset: UTF-8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    charset: UTF-8
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: quiz-master-secret-key-2024-very-long-and-secure
  expiration: 86400000
